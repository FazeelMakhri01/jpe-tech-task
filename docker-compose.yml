version: '3.8'

services:
  app:
    image: release-status-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    container_name: release-status-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge